name: Build & Push playwright-api

on:
  push:
    branches:
      - main
    paths:
      - "playwright-api/**"
      - ".github/workflows/deploy.yml"

env:
  PLAYWRIGHT_VERSION: "1.60.0"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build e Push
        uses: docker/build-push-action@v5
        with:
          context: ./playwright-api
          push: true
          tags: |
            ghcr.io/ragheria/cnadv-playwright-api:latest
            ghcr.io/ragheria/cnadv-playwright-api:${{ env.PLAYWRIGHT_VERSION }}
          build-args: PLAYWRIGHT_VERSION=${{ env.PLAYWRIGHT_VERSION }}
